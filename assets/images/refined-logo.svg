<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500&amp;family=Outfit:wght@600&amp;display=swap');
    </style>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e6c875" />
      <stop offset="40%" stop-color="#d4af37" />
      <stop offset="100%" stop-color="#aa8529" />
    </linearGradient>
  </defs>

  <!-- Logo Mark -->
  <g stroke="url(#gold)" stroke-linecap="round" stroke-linejoin="round">
    <!-- Needle -->
    <path d="M 96 35 C 96 25, 104 25, 104 35 L 102 110 L 100 130 L 98 110 Z M 98 33 L 98 50 C 98 53, 102 53, 102 50 L 102 33 C 102 30, 98 30, 98 33 Z" fill="url(#gold)" stroke="none" fill-rule="evenodd"/>
    
    <!-- 'f' shape -->
    <path d="M 65 110 L 65 65 C 65 35, 80 30, 95 30" stroke-width="4.5" />
    <!-- 'f' crossbar -->
    <path d="M 40 80 L 95 80" stroke-width="4.5" />
    
    <!-- 'c' shape -->
    <path d="M 105 45 C 145 35, 155 80, 135 105 C 125 118, 112 115, 105 110" stroke-width="4.5" />
    
    <!-- Button -->
    <circle cx="100" cy="145" r="16" stroke-width="3" />
    <circle cx="100" cy="145" r="11" stroke-width="1.5" />
    <circle cx="95" cy="140" r="2.5" fill="url(#gold)" stroke="none" />
    <circle cx="105" cy="140" r="2.5" fill="url(#gold)" stroke="none" />
    <circle cx="95" cy="150" r="2.5" fill="url(#gold)" stroke="none" />
    <circle cx="105" cy="150" r="2.5" fill="url(#gold)" stroke="none" />
  </g>
  
  <!-- Text -->
  <text x="100" y="200" font-family="'Outfit', 'Montserrat', sans-serif" font-size="28" font-weight="600" letter-spacing="0.18em" fill="url(#gold)" text-anchor="middle">FRESH CRAFT</text>
  <text x="100" y="225" font-family="'Inter', sans-serif" font-size="11" font-weight="500" letter-spacing="0.45em" fill="url(#gold)" text-anchor="middle">SOURCING</text>
</svg>
